name: CI

on:
  pull_request:
    branches: [main]
    paths:
      - src/**
      - tests/**
      - pyproject.toml
      - uv.lock
      - .python-version
      - .pre-commit-config.yaml
      - Makefile
      - Dockerfile
      - docker-compose.yml
      - start.sh
      - .github/workflows/ci.yml
  push:
    branches: [main]
    paths:
      - src/**
      - tests/**
      - pyproject.toml
      - uv.lock
      - .python-version
      - .pre-commit-config.yaml
      - Makefile
      - Dockerfile
      - docker-compose.yml
      - start.sh
      - .github/workflows/ci.yml

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  UV_LINK_MODE: copy

jobs:
  pre-commit:
    name: Pre-commit
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: .python-version

      - name: Install dependencies
        run: uv sync --dev --frozen

      - name: Run pre-commit
        run: uv run pre-commit run --all-files

  tests:
    name: Tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: .python-version

      - name: Install dependencies
        run: uv sync --dev --frozen

      - name: Run pytest
        run: uv run pytest
