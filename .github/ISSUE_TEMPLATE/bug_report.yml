name: Bug Report
description: Report a reproducible bug or unexpected behavior.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please include enough detail for someone else to reproduce it.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
      placeholder: Describe the issue clearly.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: List the exact steps that trigger the issue.
      placeholder: |
        1. Start the service with ...
        2. Send ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What happened instead?
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Affected Component
      multiple: true
      options:
        - Discord bot
        - MCP server
        - Webhook server
        - Daily event reminder
        - Member database
        - Docker/deployment
        - Other
    validations:
      required: true

  - type: dropdown
    id: environment
    attributes:
      label: Environment
      options:
        - Local
        - Docker Compose
        - Production
        - Other
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs or Traceback
      description: Paste relevant logs. Remove tokens, API keys, and personal data.
      render: shell
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Add screenshots, payload examples, related links, or other context.
    validations:
      required: false

  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues before opening this one.
          required: true
        - label: I removed secrets and sensitive data from logs and examples.
          required: true
